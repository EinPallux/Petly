# ──────────────────────────────────────────────
#  Petly — Quest Definitions
#  3 random daily quests are assigned each day.
#  3 random weekly quests are assigned each week.
#  Quest types: COMPLETE_MISSIONS, SUMMON_PETS,
#               BEAT_TOWER_FLOORS, REACH_TOWER_FLOOR, OWN_PETS
# ──────────────────────────────────────────────

