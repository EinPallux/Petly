# ──────────────────────────────────────────────
#  Petly — Achievements
#  One-time milestones players can complete and claim for permanent rewards.
#  'commands' are dispatched from console with {player} replaced by the player's name.
#  Credits are a premium currency — keep rewards appropriately rare.
# ──────────────────────────────────────────────

