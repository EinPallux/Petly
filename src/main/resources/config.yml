# ──────────────────────────────────────────────
#  Petly — Main Configuration
# ──────────────────────────────────────────────

storage:
  # YAML or JSON
  type: YAML

dust-chamber:
  # How often (in ticks) the chamber generates dust. Default: every 5 minutes.
  interval-ticks: 6000
  max-slots: 3
  # Base dust generated per interval per slot (before star bonus).
  base-rate: 2
  # Multiplier added per star level of the occupying pet.
  star-multiplier: 0.5

summon:
  cost-1: 250
  cost-3: 750
  cost-6: 1500
  # How long the summon animation runs in ticks (default: 5 seconds).
  animation-duration-ticks: 100
  # Permission node required for ×3 summon. Set to empty string "" to allow all players.
  permission-3: "petly.summon.3"
  # Permission node required for ×6 summon. Set to empty string "" to allow all players.
  permission-6: "petly.summon.6"

missions:
  # Base XP multiplier awarded to pets on mission completion (scales by mission index).
  pet-xp-base: 120

# --- Pet Display ---
pet-display:
  # How often (ticks) floating pet positions update relative to player yaw.
  update-interval-ticks: 2
  # Radial distance (blocks) of pets around the player.
  orbit-radius: 1.5
  # Height offset above ground.
  height-offset: 0.2

# --- Level / XP ---
leveling:
  # Base XP required to reach level 2. Each subsequent level multiplies by xp-scaling-factor.
  xp-base: 100
  xp-scaling-factor: 1.15
  # Dust cost to purchase 1000 XP from the Pet Detail GUI.
  dust-per-1000xp: 10
  max-level: 100

# --- Mission ---
missions-settings:
  # How often (ticks) the server checks for completed missions.
  check-interval-ticks: 100

# --- Pity ---
pity:
  # After this many non-SR+ summons, the next summon is guaranteed SR+.
  guaranteed-sr-after: 50
  guaranteed-smr-after: 200
  guaranteed-ur-after: 500

# --- Milestones ---
milestones:
  tower:
    # Every N floors cleared = 1 milestone
    interval: 20
    # Stars awarded per milestone claimed
    stars-reward: 10
  missions:
    # Every N missions completed = 1 milestone
    interval: 5
    stars-reward: 15
  power:
    # Every N total team power = 1 milestone
    interval: 10000
    stars-reward: 50
